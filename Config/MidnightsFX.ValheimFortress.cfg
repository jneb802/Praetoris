[Auto Ballista]

## Whether or not the automated ballista will target passive creatures (like deer)
# Setting type: Boolean
# Default value: false
EnableTargetingPassiveCreatures = false

## How much damage the automated ballista does per shot.
# Setting type: Single
# Default value: 120
# Acceptable value range: From 10 to 5000
BallistaDamage = 120

## How far the ballista can aquire targets and shoot
# Setting type: Single
# Default value: 30
# Acceptable value range: From 10 to 100
BallistaRange = 30

## How inaccurate the ammo is for the ballista
# Setting type: Single
# Default value: 0.05
# Acceptable value range: From 0 to 0.15
BallistaAmmoAccuracyPenalty = 0.05

## How long the ballista waits before another shot
# Setting type: Single
# Default value: 2
# Acceptable value range: From 0.5 to 10
BallistaCooldownTime = 2

## How many ticks until the ballista updates its cache of nearby enemies.
# Setting type: Int16
# Default value: 5
# Acceptable value range: From 1 to 10
BallistaTargetUpdateCacheInterval = 5

## Whether or not the ballista will verify it won't hit other things before shooting.
# Setting type: Boolean
# Default value: true
BallistaEnableShotSafetyCheck = true

