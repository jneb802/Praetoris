[Difficulty Levels]

## The base number of points that all waves add. This is especially impactful in early levels (meadows).
# Setting type: Int16
# Default value: 100
# Acceptable value range: From 100 to 1000
BaseChallengePoints = 100

## The absolute max number of points a wave can generate with, higher values will be clamped down to this value.
# Setting type: Int16
# Default value: 3000
# Acceptable value range: From 1000 to 30000
MaxChallengePoints = 3000

## The linear regression slope which increases difficulty. If you want harder waves, add 1 and try out the difficulty again.
# Setting type: Single
# Default value: 15
# Acceptable value range: From 5 to 50
ChallengeSlope = 15

## The chance that a valid prior biome creature will be selected. Only 1 can be selected per wave. Setting to zero disables generating waves with previous biome creatures.
# Setting type: Single
# Default value: 0.05
# Acceptable value range: From 0 to 1
ChanceOfPreviousBiomeCreature = 0.05

## The max number of stars a creature can have. SLE or CLLC is required for anything over 2.
# Setting type: Int16
# Default value: 2
# Acceptable value range: From 0 to 10
MaxCreatureStars = 2

