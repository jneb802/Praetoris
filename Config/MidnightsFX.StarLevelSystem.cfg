## The chance that a creature will have a minor modifier (creatures can have BOTH major and minor modifiers).
# Setting type: Single
# Default value: 0.25
# Acceptable value range: From 0 to 1
ChanceMinorModifier = 0.25

## Wether or not bosses can spawn with modifiers.
# Setting type: Boolean
# Default value: true
EnableBossModifiers = true

## The chance that a boss will have a modifier.
# Setting type: Single
# Default value: 0.75
# Acceptable value range: From 0 to 1
ChanceOfBossModifier = 0.75

## The maximum number of modifiers that a boss can have.
# Setting type: Int32
# Default value: 2
# Acceptable value range: From 0 to 150
MaxBossModifiersPerBoss = 2

## Wether or not creatures spawned from the Splitter modifier inherit the level of the parent creature.
# Setting type: Boolean
# Default value: true
SplittersInheritLevel = true

## Maximum number of prefix names to use when building a creatures name.
# Setting type: Int32
# Default value: 3
# Acceptable value range: From 0 to 150
LimitCreatureModifierPrefixes = 3

## Enables or disables ordering of modifiers for naming. If enabled, minor modifiers will be sorted first eg: Fast Poisonous
# Setting type: Boolean
# Default value: false
MinorModifiersFirstInName = false

